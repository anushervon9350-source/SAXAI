<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAX AI</title>
    <style>
        body {
            background: #0b0d10;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        .logo {
            font-size: 60px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 48px;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #8892a8;
            font-size: 18px;
        }
        .status {
            display: inline-block;
            background: rgba(108, 92, 231, 0.2);
            padding: 8px 24px;
            border-radius: 40px;
            color: #a29bfe;
            font-size: 14px;
            margin-top: 20px;
        }
        .api-link {
            color: #6c5ce7;
            text-decoration: none;
            font-weight: 500;
        }
        .api-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🤖</div>
        <h1>SAX AI</h1>
        <p>Умный ассистент на связи</p>
        <div class="status">🟢 Сервер работает</div>
        <br><br>
        <a href="/api/status" class="api-link">📡 Проверить статус</a>
    </div>
</body>
</html>
